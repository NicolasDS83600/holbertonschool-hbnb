<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB – Login</title>
    <link rel="icon" href="images/icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bubbles-layer-2" aria-hidden="true"></div>
    <div class="bubbles-layer-3" aria-hidden="true"></div>
    <header>
        <a href="index.html"><img src="images/logo.png" class="logo" alt="HBnB logo"></a>
        <nav>
            <a href="index.html">Home</a>
            <span id="user-info" class="user-info" style="display:none;"></span>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <form id="login-form">
            <h2>Login</h2>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Login</button>
        </form>
    </main>

    <footer><p>&copy; 2024 HBnB. All rights reserved.</p></footer>
    <script src="scripts.js"></script>
</body>
</html>
